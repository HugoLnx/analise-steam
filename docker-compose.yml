services:
  backend:
    networks:
      - steam-net

    build:
      context: .
      dockerfile: Dockerfile
    container_name: steam-analytics-backend
    ports:
      - "8000:8000"
    environment:
      # Accept CORS requests from the frontend container and (optionally) local dev
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://frontend:5173"
    volumes:
      - ./steam_analytics/db.sqlite3:/app/db.sqlite3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: steam-analytics-frontend
    ports:
      - "5173:5173"
    environment:
      # Used by the frontend to reach the backend through docker network
      VITE_API_BASE_URL: "http://backend:8000"
    depends_on:
      - backend
    networks:
      - steam-net
    restart: unless-stopped

networks:
  steam-net:
    driver: bridge


